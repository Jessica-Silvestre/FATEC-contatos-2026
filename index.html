<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />

  <script src="./app.js" defer type="module"></script>

  <title>Contatos</title>
</head>

<body>

  <main class="container">

    <h1>Contatos</h1>

    <!-- FORMULÁRIO -->
    <form id="form-contato">

      <div class="fields">

        <div class="field-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Ex: Maria Silva" required />
        </div>

        <div class="field-group">
          <label for="celular">Celular</label>
          <input type="tel" id="celular" placeholder="(11) 99999-9999" required />
        </div>

        <div class="field-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="exemplo@email.com" required />
        </div>

        <div class="field-group">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" placeholder="Ex: São Roque" />
        </div>

        <div class="field-group">
          <label for="foto">Foto (URL)</label>
          <input type="text" id="foto" placeholder="https://..." />
        </div>

      </div>

      <!-- UPLOAD -->
      <div class="preview-container">

        <input
          id="preview-input"
          class="preview-input"
          type="file"
          accept="image/*"
        />

        <label class="preview-label" for="preview-input">

          <img
            id="preview-image"
            class="preview-image"
            src="img/icons8-fazer-upload-48.png"
            alt="Foto do contato"
          />

          <span class="preview-hint">
            Ou clique para carregar arquivo
          </span>

        </label>

      </div>

      <!-- BOTÕES -->
      <div class="button-container">

        <button class="button button-primary" type="submit">
          Salvar
        </button>

        <button
          class="button button-secondary"
          type="reset"
          id="btn-cancelar"
        >
          Cancelar
        </button>

      </div>

    </form>

    <!-- LISTA -->
    <section
      id="lista-contatos"
      aria-label="Contatos cadastrados"
    ></section>

  </main>

  <footer>
    <b>
      Fatec São Roque – Aluna: Jéssica Silvestre de Paula –
      RA: 2650832513013
    </b>
  </footer>

</body>
</html>
